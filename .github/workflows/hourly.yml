name: Hourly Moldova News
on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  # Allows you to run it manually from the "Actions" tab
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    # Forces GitHub to use Node 24 to remove deprecation warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Restore history cache
        id: cache-history
        uses: actions/cache@v4
        with:
          path: |
            posted_links.txt
            posted_titles.txt
          # Using run_id ensures the cache is updated every single time
          key: posted-history-${{ github.run_id }}
          restore-keys: |
            posted-history-

      - name: Run the script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # This name MUST match what you named the secret in GitHub Settings
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main.py

      - name: Save history cache
        # This ensures cache saves even if the script finds no news
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            posted_links.txt
            posted_titles.txt
          key: posted-history-${{ github.run_id }}
