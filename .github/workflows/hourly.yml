name: Hourly Politics News

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🔍 DIAGNOSTIC STEP – Tests Gemini API key and shows full response
      - name: Test Gemini API key with detailed output
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Testing Gemini API key with model: gemini-2.5-flash"
          full_response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"contents":[{"parts":[{"text":"Say hello"}]}]}' \
            "https://generativelanguage.googleapis.com/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY")
          
          http_code=$(echo "$full_response" | tail -n1)
          body=$(echo "$full_response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Full Response Body:"
          # Try to pretty-print JSON if jq is available, otherwise print raw
          echo "$body" | jq . 2>/dev/null || echo "$body"

          if [ "$http_code" -ne 200 ]; then
            echo "❌ ERROR: API call failed. Check your API key and model access."
            exit 1
          else
            echo "✅ Gemini API key is valid and model is accessible!"
          fi

      - name: Restore posted links cache
        id: cache-history
        uses: actions/cache@v4
        with:
          path: posted_links.txt
          key: posted-links-${{ github.run_id }}
          restore-keys: |
            posted-links-

      - name: Run the script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save posted links cache
        uses: actions/cache@v4
        with:
          path: posted_links.txt
          key: posted-links-${{ github.run_id }}
