name: Hourly Politics News

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Restore posted links cache
        id: cache-history
        uses: actions/cache@v4
        with:
          path: posted_links.txt
          key: posted-links-${{ github.run_id }}
          restore-keys: |
            posted-links-

      - name: Run the script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save posted links cache
        uses: actions/cache@v4
        with:
          path: posted_links.txt
          key: posted-links-${{ github.run_id }}
