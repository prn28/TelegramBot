name: Hourly Politics News

on:
  schedule:
    # Runs every hour at minute 0 (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:      # Allows manual trigger from the Actions tab

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🔍 TEMPORARY DIAGNOSTIC STEP – Test Gemini API key
      - name: Test Gemini API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Testing Gemini API key..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"contents":[{"parts":[{"text":"Say hello"}]}]}' \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP Status: $http_code"
          echo "Response body: $body"
          if [ "$http_code" -ne 200 ]; then
            echo "❌ Gemini API key test failed. Check your key and model name."
            exit 1
          else
            echo "✅ Gemini API key is valid!"
          fi

      - name: Restore posted links cache
        id: cache-history
        uses: actions/cache@v4
        with:
          path: posted_links.txt
          key: posted-links-${{ github.run_id }}
          restore-keys: |
            posted-links-

      - name: Run the script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save posted links cache
        uses: actions/cache@v4
        with:
          path: posted_links.txt
          key: posted-links-${{ github.run_id }}
