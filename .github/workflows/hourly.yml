name: Hourly Moldova News
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    concurrency:
      group: moldova-news
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Restore history cache
        id: cache-history
        uses: actions/cache@v4
        with:
          path: |
            posted_links.txt
            posted_titles.txt
          key: posted-history-stable
          restore-keys: |
            posted-history-
      - name: Run the script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
      - name: Save history cache
        uses: actions/cache@v4
        with:
          path: |
            posted_links.txt
            posted_titles.txt
          key: posted-history-stable
