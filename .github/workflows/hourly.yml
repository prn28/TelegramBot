name: Hourly Moldova News

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:       # Allows manual trigger from Actions tab

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🔍 DIAGNOSTIC STEP – Tests Groq API key before running the bot
      - name: Test Groq API key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Testing Groq API key..."
          full_response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -d '{"model":"llama3-8b-8192","messages":[{"role":"user","content":"Say hello"}],"max_tokens":10}' \
            "https://api.groq.com/openai/v1/chat/completions")

          http_code=$(echo "$full_response" | tail -n1)
          body=$(echo "$full_response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Full Response Body:"
          echo "$body" | jq . 2>/dev/null || echo "$body"

          if [ "$http_code" -ne 200 ]; then
            echo "❌ ERROR: Groq API call failed. Check your GROQ_API_KEY secret."
            exit 1
          else
            echo "✅ Groq API key is valid and working!"
          fi

      - name: Restore posted links cache
        id: cache-history
        uses: actions/cache@v4
        with:
          path: posted_links.txt
          key: posted-links-${{ github.run_id }}
          restore-keys: |
            posted-links-

      - name: Run the script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save posted links cache
        uses: actions/cache@v4
        with:
          path: posted_links.txt
          key: posted-links-${{ github.run_id }}
