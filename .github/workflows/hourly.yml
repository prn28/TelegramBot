name: Hourly Moldova News

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 310        # FIX: 4.5h script + 10min buffer = ~280min; 310 is safe
    concurrency:
      group: moldova-news
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # FIX #3: Use run_id as cache key so history is always saved.
      # restore-keys fallback picks up the latest previous run's cache.
      - name: Restore history cache
        id: cache-history
        uses: actions/cache@v4
        with:
          path: |
            posted_links.txt
            posted_titles.txt
          key: posted-history-${{ github.run_id }}
          restore-keys: |
            posted-history-

      - name: Run the script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save history cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            posted_links.txt
            posted_titles.txt
          key: posted-history-${{ github.run_id }}

      # FIX #10: Alert via Telegram if the workflow fails
      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=⚠️ Republica News: workflow EȘUAT pe GitHub Actions (run #${{ github.run_id }})"
