name: Moldova News Every 30 Min
on:
  schedule:
    - cron: '0,30 * * * *'  # Runs every 30 minutes
  workflow_dispatch:       # Allows manual trigger from Actions tab
jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      # 🔍 DIAGNOSTIC STEP – Tests OpenRouter API key before running the bot
      - name: Test OpenRouter API key
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          echo "Testing OpenRouter API key..."
          full_response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENROUTER_KEY" \
            -H "HTTP-Referer: https://github.com" \
            -H "X-Title: Moldova News Bot" \
            -d '{"model":"openrouter/free","messages":[{"role":"user","content":"Say hello"}],"max_tokens":10}' \
            "https://openrouter.ai/api/v1/chat/completions")
          http_code=$(echo "$full_response" | tail -n1)
          body=$(echo "$full_response" | sed '$d')
          echo "HTTP Status: $http_code"
          echo "Full Response Body:"
          echo "$body" | jq . 2>/dev/null || echo "$body"
          if [ "$http_code" -ne 200 ]; then
            echo "❌ ERROR: OpenRouter API call failed. Check your OPENROUTER_KEY secret."
            exit 1
          else
            echo "✅ OpenRouter API key is valid and working!"
          fi
      - name: Restore posted links cache
        id: cache-history
        uses: actions/cache@v4
        with:
          path: posted_links.txt
          key: posted-links-stable
          restore-keys: |
            posted-links-
      - name: Run the script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
      - name: Save posted links cache
        uses: actions/cache@v4
        with:
          path: posted_links.txt
          key: posted-links-stable
